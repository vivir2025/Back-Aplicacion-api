name: Autenticación
description: |-

  Endpoints para gestionar el acceso a la API y el perfil del usuario.
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/login
    metadata:
      custom: []
      groupName: Autenticación
      groupDescription: |-

        Endpoints para gestionar el acceso a la API y el perfil del usuario.
      subgroup: ''
      subgroupDescription: ''
      title: 'Iniciar sesión'
      description: 'Permite a un usuario obtener un token de acceso (Bearer) proporcionando sus credenciales.'
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      usuario:
        custom: []
        name: usuario
        description: 'El nombre de usuario.'
        required: true
        example: admin
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      contrasena:
        custom: []
        name: contrasena
        description: 'La contraseña del usuario.'
        required: true
        example: secret123
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanBodyParameters:
      usuario: admin
      contrasena: secret123
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
           "token": "1|ABC...",
           "usuario": {"id": 1, "nombre": "Admin", "rol": "admin"},
           "sede": {"id": 1, "nombre": "Sede Central"}
          }
        headers: []
        description: ''
      -
        custom: []
        status: 422
        content: |-
          {
           "message": "Las credenciales proporcionadas son incorrectas.",
           "errors": {"usuario": ["Las credenciales proporcionadas son incorrectas."]}
          }
        headers: []
        description: ''
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - POST
    uri: api/logout
    metadata:
      custom: []
      groupName: Autenticación
      groupDescription: |-

        Endpoints para gestionar el acceso a la API y el perfil del usuario.
      subgroup: ''
      subgroupDescription: ''
      title: 'Cerrar sesión'
      description: 'Revoca el token de acceso actual del usuario autenticado.'
      authenticated: true
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
           "message": "Sesión cerrada correctamente"
          }
        headers: []
        description: ''
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - GET
    uri: api/perfil
    metadata:
      custom: []
      groupName: Autenticación
      groupDescription: |-

        Endpoints para gestionar el acceso a la API y el perfil del usuario.
      subgroup: ''
      subgroupDescription: ''
      title: 'Ver perfil'
      description: 'Obtiene la información detallada del usuario autenticado y su sede asociada.'
      authenticated: true
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
           "id": 1,
           "nombre": "Admin",
           "usuario": "admin",
           "correo": "admin@test.com",
           "rol": "admin",
           "sede": {"id": 1, "nombre": "Sede Central"}
          }
        headers: []
        description: ''
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - PUT
    uri: api/perfil
    metadata:
      custom: []
      groupName: Autenticación
      groupDescription: |-

        Endpoints para gestionar el acceso a la API y el perfil del usuario.
      subgroup: ''
      subgroupDescription: ''
      title: 'Actualizar perfil'
      description: 'Permite al usuario autenticado actualizar su nombre, correo y contraseña.'
      authenticated: true
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      nombre:
        custom: []
        name: nombre
        description: 'El nombre completo.'
        required: false
        example: 'Juan Perez'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      correo:
        custom: []
        name: correo
        description: 'El correo electrónico.'
        required: false
        example: juan@test.com
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      contrasena_actual:
        custom: []
        name: contrasena_actual
        description: 'La contraseña actual (requerida si se cambia la nueva).'
        required: false
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      contrasena_nueva:
        custom: []
        name: contrasena_nueva
        description: 'La nueva contraseña (mínimo 6 caracteres).'
        required: false
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      nombre: 'Juan Perez'
      correo: juan@test.com
      contrasena_actual: consequatur
      contrasena_nueva: consequatur
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
           "message": "Perfil actualizado correctamente",
           "usuario": {"id": 1, "nombre": "Juan Perez", "correo": "juan@test.com"}
          }
        headers: []
        description: ''
      -
        custom: []
        status: 422
        content: |-
          {
           "error": "La contrasena actual no es correcta"
          }
        headers: []
        description: ''
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
